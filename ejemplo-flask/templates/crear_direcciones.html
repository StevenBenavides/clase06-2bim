<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Dirección</title>
</head>
<body>
    <div class="container">
        <h1>Crear Nueva Dirección</h1>

        {# Mostrar mensajes flash de Flask #}
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
            {% for category, message in messages %}
              <li class="flash-message flash-{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div>
                <label for="descripcion">Dirección:</label>
                <input type="text" id="descripcion" name="descripcion" required>
            </div>
            <div>
                <label for="tipo">Tipo:</label>
                <input type="text" id="tipo" name="tipo" required>
            </div>
            <div>
                <label for="estudiante">Estudiante:</label>
                <select id="estudiante" name="estudiante" required>
                    {% if estudiantes %}
                        {# Se itera sobre la lista de estudiantes obtenida de la API #}
                        {% for estudiante in estudiantes %}
                            {# El 'value' del option debe ser la URL completa del estudiante #}
                            {# ya que tu DireccionSerializer espera un HyperlinkedRelatedField #}
                            <option value="{{ estudiante.url }}">{{ estudiante.nombre }} {{ estudiante.apellido }} ({{ estudiante.cedula }})</option>
                        {% endfor %}
                    {% else %}
                        <option value="">No hay estudiantes disponibles</option>
                    {% endif %}
                </select>
            </div>
            <button type="submit">Crear Dirección</button>
        </form>

        <a href="{{ url_for('las_direcciones') }}" class="back-link">Volver a la lista de direcciones</a>
    </div>
</body>
</html>
