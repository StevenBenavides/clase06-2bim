<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Nueva Dirección</title>
</head>
<body>
    <div class="container">
        <h1>Crear Nueva Dirección</h1>

        {# Mostrar mensajes flash de Flask #}
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            <ul class="flash-messages">
            {% for category, message in messages %}
              <li class="flash-message flash-{{ category }}">{{ message }}</li>
            {% endfor %}
            </ul>
          {% endif %}
        {% endwith %}

        <form method="POST">
            <div>
                <label for="direccion">Dirección:</label>
                <input type="text" id="direccion" name="direccion" required>
            </div>
            <div>
                <label for="ciudad">Ciudad:</label>
                <input type="text" id="ciudad" name="ciudad" required>
            </div>
            <div>
                <label for="pais">País:</label>
                <input type="text" id="pais" name="pais" required>
            </div>
            <button type="submit">Crear Dirección</button>
        </form>

        <a href="{{ url_for('las_direcciones') }}" class="back-link">Volver a la lista de direcciones</a>
    </div>
</body>
</html>
